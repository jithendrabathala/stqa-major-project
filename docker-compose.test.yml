services:
  chrome:
    image: selenium/standalone-chromium:latest
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: 2g
    depends_on:
      - app

  cypress:
    image: cypress/included:13.8.0
    environment:
      - CYPRESS_baseUrl=http://app:3000
    volumes:
      - .:/e2e
    working_dir: /e2e
    depends_on:
      app:
        condition: service_healthy

  selenium-runner:
    image: maven:3.9-eclipse-temurin-17
    environment:
      - APP_BASE_URL=http://app:3000
      - SELENIUM_GRID_URL=http://chrome:4444/wd/hub
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app/tests/selenium
    command: mvn clean test
    depends_on:
      app:
        condition: service_healthy
      chrome:
        condition: service_started
