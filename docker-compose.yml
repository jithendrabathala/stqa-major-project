version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: book-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    container_name: book-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/bookdb
    depends_on:
      - mongodb

volumes:
  mongo-data:
